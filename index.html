<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>数据看板 · effie_databoard</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="screen">
    <header class="topbar">
      <div class="topbar-side left">
        <span class="dot"></span>
        <span id="onlineText">在线访客 0</span>
      </div>
      <h1 class="title">实时运营数据大屏</h1>
      <div class="topbar-side right">
        <button id="pauseBtn" class="ctrl-btn">⏸ 暂停</button>
        <span id="dateText"></span>
        <span id="clockText">00:00:00</span>
      </div>
    </header>

    <section class="kpis">
      <div class="kpi">
        <div class="kpi-label">今日订单量</div>
        <div class="kpi-value" id="kpiOrders">0</div>
        <div class="kpi-sub" id="kpiOrdersSub">较昨日 +0.0%</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">实时访问数 / 分</div>
        <div class="kpi-value" id="kpiVisits">0</div>
        <div class="kpi-sub" id="kpiVisitsSub">环比 +0.0%</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">今日销售额</div>
        <div class="kpi-value" id="kpiSales">0</div>
        <div class="kpi-sub" id="kpiSalesSub">目标完成 0%</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">转化率</div>
        <div class="kpi-value" id="kpiConv">0%</div>
        <div class="kpi-sub" id="kpiConvSub">行业均值 3.1%</div>
      </div>
    </section>

    <main class="grid">
      <div class="col col-left">
        <div class="panel">
          <div class="panel-title">渠道占比</div>
          <div class="panel-body"><div id="chartChannel" class="chart"></div></div>
        </div>
        <div class="panel">
          <div class="panel-title">区域访问 TOP</div>
          <div class="panel-body"><div id="chartRegion" class="chart"></div></div>
        </div>
      </div>

      <div class="col col-center">
        <div class="panel panel-topo">
          <div class="panel-title">数据中枢态势（REALTIME TOPOLOGY）</div>
          <div class="panel-body"><div id="chartTopo" class="chart"></div></div>
        </div>
        <div class="panel panel-summary">
          <div class="panel-title">智能摘要</div>
          <div class="panel-body summary" id="summary"></div>
        </div>
      </div>

      <div class="col col-right">
        <div class="panel">
          <div class="panel-title">平台能力（CAPABILITY）</div>
          <div class="panel-body"><div id="chartRadar" class="chart"></div></div>
        </div>
        <div class="panel">
          <div class="panel-title">
            <span>预测趋势（含未来 6 时段）</span>
            <span class="ctrl">
              <button class="seg active" data-metric="orders">订单量</button>
              <button class="seg" data-metric="visits">访问数</button>
              <button class="seg" data-metric="sales">销售额</button>
            </span>
          </div>
          <div class="panel-body"><div id="chartForecast" class="chart"></div></div>
        </div>
      </div>
    </main>

    <section class="bottom">
      <div class="panel panel-feed">
        <div class="panel-title">实时订单流</div>
        <div class="panel-body feed" id="feed"></div>
      </div>
      <div class="panel panel-visits">
        <div class="panel-title">24 小时访问曲线</div>
        <div class="panel-body"><div id="chartVisits" class="chart"></div></div>
      </div>
      <div class="panel panel-load">
        <div class="panel-title">服务节点状态（LOAD）</div>
        <div class="panel-body load" id="load"></div>
      </div>
    </section>
  </div>

  <script src="./echarts.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
